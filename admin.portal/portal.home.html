 ************************************************************************************************************************
 *              PortalAdmin HOME — selettore overlay PROJECT_* e prepare istanza cruscotto.
 ************************************************************************************************************************

 Descrizione funzionale:

   Perché esiste:
   - Utente deve attivare PRJ_NAME e PRODUCT_REPO_PATH senza editare .env manualmente.

   A cosa serve:
   - Griglia progetti, stato prepare, link cruscotto e console diagnostica processi node.

 Generalizzazione:
   Si — card progetti da API listAvailableProjects; testi da risposta server.

 Input:
   - GET /api/portal/projects — elenco overlay attivabili
   - POST /api/portal/instance — body overlayName per attivazione

 Servita da:
   - admin.portal/portal.home.server.mjs — route / e static home

 Asset collegati:
   - portal.home.css — stili shell HOME
   - portal.home.js — fetch API, grid e console prepare

 ------------------------------------------------------------------------------------------------------------------------ -->
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PortalAdmin — Home</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/home.css" />
</head>
<body class="portal-home">
  <header class="portal-topbar">
    <div class="portal-topbar-brand">
      <span class="portal-mark" aria-hidden="true">PA</span>
      <div>
        <p class="portal-topbar-kicker">PortalAdmin</p>
        <h1 id="portal-page-title">Selettore progetto</h1>
      </div>
    </div>
    <nav class="portal-main-nav" aria-label="Sezioni HOME">
      <button type="button" class="portal-nav-btn active" data-portal-view="progetti">Progetti</button>
      <button type="button" class="portal-nav-btn" data-portal-view="documenti">Documenti</button>
      <button type="button" class="portal-nav-btn" data-portal-view="cursor-rules">ADMIN Cursor Rule</button>
    </nav>
    <div class="portal-topbar-status">
      <p class="portal-instance-line" id="instance-status">Caricamento…</p>
      <a class="portal-topbar-link" href="/app.html" id="link-cruscotto" hidden>Apri cruscotto →</a>
    </div>
  </header>

  <main class="portal-main">
    <div id="view-progetti" class="portal-view">
    <div class="portal-shell">
    <section class="portal-projects" aria-labelledby="projects-title">
      <header class="portal-section-head">
        <div>
          <h2 id="projects-title">Progetti disponibili</h2>
          <p class="muted portal-section-lead">
            Scegli overlay e <strong>Istanzia</strong> (scrive <code>.env</code> e prepare),
            poi <strong>Apri cruscotto</strong> — avvio automatico se non già in ascolto.
          </p>
        </div>
      </header>
      <div class="portal-project-grid" id="project-grid" aria-live="polite"></div>
    </section>

    <section class="portal-console" id="console-panel" aria-label="Console output">
      <header class="portal-console-head">
        <div class="portal-console-title">
          <h2>Console</h2>
          <p class="portal-console-status" id="prepare-message">In attesa — istanzia un progetto.</p>
        </div>
        <div class="portal-console-toolbar">
          <label class="portal-log-filter">
            <span class="sr-only">Livello log</span>
            <select id="portal-log-level" data-portal-log-level aria-label="Filtro livello log">
              <option value="all">Tutti i livelli</option>
              <option value="debug">debug</option>
              <option value="info" selected>info+</option>
              <option value="warn">warn+</option>
              <option value="error">error</option>
            </select>
          </label>
          <label class="portal-log-filter">
            <span class="sr-only">Sorgente log</span>
            <select id="portal-log-source" data-portal-log-source aria-label="Filtro sorgente log"></select>
          </label>
          <label class="process-console-follow-label">
            <input type="checkbox" id="portal-log-follow" data-portal-log-follow checked />
            Auto-scroll
          </label>
          <button type="button" class="btn-ghost" id="btn-list-node-procs">Processi Node</button>
          <button type="button" class="btn-ghost btn-sm" id="btn-clear-console" data-portal-log-clear title="Svuota log sul server">Clear console</button>
          <label class="portal-pid-field">
            <span class="sr-only">PID</span>
            <input
              type="number"
              id="node-kill-pid"
              placeholder="PID"
              min="1"
              aria-label="PID processo da terminare"
            />
          </label>
          <button type="button" class="btn-danger btn-sm" id="btn-kill-node-pid" disabled>Kill</button>
          <button type="button" class="btn-danger btn-sm" id="btn-kill-node-all" disabled>Kill tutti</button>
          <span class="portal-toolbar-sep" aria-hidden="true"></span>
          <button type="button" class="btn-primary" id="btn-open-cruscotto" disabled>Apri cruscotto</button>
          <button type="button" class="btn-ghost" id="btn-reload-hint" hidden>Riavvia server</button>
        </div>
      </header>
      <div
        id="portal-log-output"
        class="portal-console-log process-console-output"
        data-portal-log-output
        role="log"
        aria-live="polite"
        aria-relevant="additions"
      ></div>
      <p class="muted portal-console-foot" id="reload-note" hidden></p>
    </section>
    </div>
    </div>

    <div id="view-documenti" class="portal-view hidden" aria-label="Documentazione">
      <iframe
        class="portal-docs-frame"
        src="/docs/1.document.index.html"
        title="Documentazione PortalAdmin — docs/"
      ></iframe>
    </div>

    <div id="view-cursor-rules" class="portal-view hidden" aria-label="Regole Cursor ADMIN">
      <iframe
        class="portal-docs-frame"
        src="/doc.cursor.rule/index.html"
        title="ADMIN Cursor Rule — doc.cursor.rule/"
      ></iframe>
    </div>
  </main>

  <footer class="portal-footer muted">
    <span>HOME <code>:3990</code></span>
    <span aria-hidden="true">·</span>
    <a href="https://github.com/IbyEll/PortalAdmin">GitHub</a>
  </footer>

  <script src="/portal.console.client.js" defer></script>
  <script type="module" src="/home.js"></script>
</body>
</html>
