<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PortalAdmin — Documenti</title>
  <link rel="stylesheet" href="/docs/docs-chrome.css" />
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4f;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #3d9cf5;
      --turquoise: #2ee8d6;
      --ok: #48bb78;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 1.5rem 3rem;
    }
    h1 { margin: 0 0 0.35rem; font-size: 1.65rem; }
    .meta { color: var(--muted); font-size: 0.9rem; }
    .lead { color: var(--muted); margin: 0.75rem 0 1rem; }
    code {
      font-family: ui-monospace, monospace;
      font-size: 0.88em;
      background: var(--surface);
      padding: 0.12em 0.4em;
      border-radius: 4px;
      border: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <!-- DOCS-CHROME -->
  <div class="page">
    <header>
      <h1>Documentazione PortalAdmin</h1>
      <p class="meta">Indice pagine HTML in <code>docs/</code> — servite dal cruscotto su <code>/docs/</code></p>
      <p class="lead">
        Usa il pulsante <strong>Aggiorna</strong> nella toolbar per analizzare il repo e applicare
        aggiornamenti con <em>barrato + commento</em> sulle voci obsolete.
      </p>
    </header>
    <div id="docs-index-list" class="docs-index-grid" aria-live="polite"></div>
  </div>
  <script src="/docs/docs-chrome.js" defer></script>
  <script>
    fetch("/api/docs/list")
      .then((r) => r.json())
      .then((data) => {
        const root = document.getElementById("docs-index-list");
        const pages = (data.pages || []).filter((p) => p.name !== "index.html");
        for (const page of pages) {
          const a = document.createElement("a");
          a.className = "docs-index-card";
          a.href = page.href;
          a.innerHTML = `<strong>${page.title}</strong><span class="meta">${page.name}</span>`;
          root.appendChild(a);
        }
      })
      .catch(() => {
        document.getElementById("docs-index-list").textContent = "Errore caricamento elenco.";
      });
  </script>
</body>
</html>
