************************************************************************************************************************
              API Documentation — indice OpenAPI servizi product (card + tabella path aggregata)
************************************************************************************************************************

  Descrizione funzionale:

    Perché esiste:
    - offrire una vista leggibile degli endpoint del monorepo product senza Swagger UI esterno
    - pagina statica servita su porta dedicata (:4080) accanto allo stack dev

    A cosa serve:
    - header progetto, card servizi con link /docs e tabella path OpenAPI aggregati
    - shell HTML per il companion cruscotto.api.documentation.js (href legacy ./portal.js)

  Generalizzazione:
    Si — path servizi e titoli da PRODUCT_REPO_PATH via buildApiDocumentationConfig.

  Input:
    - PRODUCT_REPO_PATH — monorepo product per manifest e URL servizi
    - GET /config.json — payload runtime (titolo, base URL, specUrl per ogni servizio)
    - spec OpenAPI — fetch dal companion cruscotto.api.documentation.js

  Servita da:
    - cruscotto.frontend/cruscotto.api.documentation.server.mjs — URL / su :4080 (root api.documentation/)
    - cruscotto.frontend/cruscotto.process.start.api.documentation.mjs — avvio processo API Documentation

  Asset collegati:
    - CSS inline in head — tema dark API Documentation
    - cruscotto.api.documentation.js — script companion (servito come ./portal.js in api.documentation/)

  API usate (fetch dal companion JS):
    - GET /config.json — servizi OpenAPI del product repo attivo
    - GET service.specUrl — documento OpenAPI per ogni servizio in config

  Sezioni DOM principali:
    - #portal-title, #portal-subtitle, #portal-meta — intestazione progetto
    - #service-cards — card servizi con link Swagger nativo
    - #paths-status, #paths-body — stato caricamento e righe tabella path

  Note:
    - modificare solo layout/statica; dati path popolati dal companion JS
------------------------------------------------------------------------------------------------------------------------
-->

<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>API Documentation — PortalAdmin</title>
  <style>
    :root {
      --portal-bg       : #0f1419;
      --portal-surface  : #1a2332;
      --portal-border   : #2d3a4f;
      --portal-text     : #e7ecf3;
      --portal-muted    : #8b9cb3;
      --portal-accent   : #3d9cf5;
      --portal-auth     : #a78bfa;
      --portal-api      : #34d399;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin     : 0;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background : var(--portal-bg);
      color      : var(--portal-text);
    }

    .portal-header {
      padding      : 1.25rem 1.5rem 1rem;
      border-bottom: 1px solid var(--portal-border);
      background   : linear-gradient(180deg, #152030 0%, var(--portal-bg) 100%);
    }

    .portal-header h1 {
      margin     : 0 0 0.35rem;
      font-size  : 1.5rem;
      font-weight: 700;
    }

    .portal-header p {
      margin   : 0;
      color    : var(--portal-muted);
      font-size: 0.95rem;
    }

    .portal-meta {
      margin-top: 0.35rem;
      font-size : 0.8rem;
      color     : var(--portal-muted);
    }

    .service-cards {
      display              : grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap                  : 0.75rem;
      padding              : 1rem 1.5rem;
    }

    .service-card {
      padding      : 0.85rem 1rem;
      border       : 1px solid var(--portal-border);
      border-radius: 8px;
      background   : var(--portal-surface);
    }

    .service-card h2 {
      margin     : 0 0 0.35rem;
      font-size  : 1rem;
      font-weight: 600;
    }

    .service-card.auth h2 { color: var(--portal-auth); }
    .service-card.api h2  { color: var(--portal-api); }

    .service-card code {
      font-size: 0.82rem;
      color    : var(--portal-muted);
      word-break: break-all;
    }

    .service-card a {
      color          : var(--portal-accent);
      font-size      : 0.85rem;
      text-decoration: none;
    }

    .service-card a:hover {
      text-decoration: underline;
    }

    .paths-section {
      padding: 0 1.5rem 1.5rem;
    }

    .paths-section h2 {
      margin     : 0 0 0.75rem;
      font-size  : 1.1rem;
      font-weight: 600;
    }

    .paths-status {
      margin-bottom: 0.75rem;
      font-size    : 0.9rem;
      color        : var(--portal-muted);
    }

    .paths-status.error {
      color: #f87171;
    }

    .paths-table-wrap {
      overflow-x   : auto;
      border       : 1px solid var(--portal-border);
      border-radius: 8px;
      background   : var(--portal-surface);
      max-height   : 420px;
      overflow-y   : auto;
    }

    table.paths-table {
      width          : 100%;
      border-collapse: collapse;
      font-size      : 0.85rem;
    }

    table.paths-table th,
    table.paths-table td {
      padding      : 0.55rem 0.75rem;
      text-align   : left;
      border-bottom: 1px solid var(--portal-border);
    }

    table.paths-table th {
      position  : sticky;
      top       : 0;
      background: #1e2a3d;
      z-index   : 1;
    }

    table.paths-table tr:last-child td {
      border-bottom: none;
    }

    .method {
      display      : inline-block;
      min-width    : 3.2rem;
      padding      : 0.1rem 0.35rem;
      border-radius: 4px;
      font-size    : 0.72rem;
      font-weight  : 700;
      text-align   : center;
    }

    .method-get    { background: #064e3b; color: #6ee7b7; }
    .method-post   { background: #1e3a8a; color: #93c5fd; }
    .method-put    { background: #713f12; color: #fcd34d; }
    .method-patch  { background: #581c87; color: #d8b4fe; }
    .method-delete { background: #7f1d1d; color: #fca5a5; }

    .badge {
      display      : inline-block;
      padding      : 0.1rem 0.45rem;
      border-radius: 999px;
      font-size    : 0.72rem;
      font-weight  : 600;
    }

    .badge-auth    { background: #4c1d95; color: #ddd6fe; }
    .badge-api     { background: #064e3b; color: #a7f3d0; }
    .badge-default { background: #1e3a5f; color: #bae6fd; }
  </style>
</head>
<body>
  <header class="portal-header">
    <h1 id="portal-title">API Documentation</h1>
    <p id="portal-subtitle">Caricamento configurazione progetto…</p>
    <div id="portal-meta" class="portal-meta"></div>
  </header>

  <section id="service-cards" class="service-cards"></section>

  <section class="paths-section">
    <h2>Tutte le API — indice path</h2>
    <p id="paths-status" class="paths-status">Caricamento OpenAPI…</p>
    <div class="paths-table-wrap">
      <table class="paths-table">
        <thead>
          <tr>
            <th>Servizio</th>
            <th>Metodo</th>
            <th>Path</th>
            <th>Tag</th>
            <th>Descrizione</th>
          </tr>
        </thead>
        <tbody id="paths-body"></tbody>
      </table>
    </div>
  </section>

  <script src="./portal.js"></script>
</body>
</html>
