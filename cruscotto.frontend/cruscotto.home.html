<!--
  ** PAGE HTML ** -- commentato il: 2026-06-17

  Cruscotto Dev — shell SPA con sidebar e pannelli tab (overview, test, Jira).

  Descrizione funzionale:

    Perché esiste:
    - unificare in un’unica UI locale requisiti, servizi, test e viste Jira del product attivo
    - evitare hardcode nome repo nella shell riusabile tra overlay PROJECT_*

    A cosa serve:
    - layout sidebar + main, routing hash tra tab, iframe per pagine Jira dedicate
    - host per bootstrap progetto e companion cruscotto.home.js

  Generalizzazione:
    Si — titoli e label da overlay via data-cruscotto-bind e window.__CRUSCOTTO_PROJECT__.

  Input:
    - window.__CRUSCOTTO_PROJECT__ — iniettato da cruscotto.frontend/cruscotto.server.mjs in head
    - cruscotto.project.bootstrap.js — applica template data-cruscotto-bind
    - hash location (#overview, #test, …) — tab attiva lato client

  Servita da:
    - cruscotto.frontend/cruscotto.server.mjs — URL / e /app.html (alias home.html, index.html)

  Asset collegati:
    - cruscotto.css — unico foglio stili (shell, Jira, pillar-matrix, toolbar)
    - cruscotto.js (alias → cruscotto.home.js) — logica tab, fetch API test/servizi
    - expand-collapse-ui.js — toolbar espandi/collassa condivisa

  Sezioni DOM principali:
    - aside.cruscotto-sidebar — navigazione tab data-tab
    - header.cruscotto-topbar — #page-title, #page-subtitle
    - #section-overview … #section-process — pannelli tab (iframe backlog, projectoverview, …)
    - #ttecnici-doc-modal — modale documentazione test tecnici

  Note:
    - le pagine Jira sono iframe verso URL brevi (/backlog.html, /my-backlog.html, …)
-->
<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title data-cruscotto-bind="document.title" data-cruscotto-template="Cruscotto {projectDisplayName}">Cruscotto</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/cruscotto.css" />
</head>
<body class="cruscotto-app">
  <aside class="cruscotto-sidebar" aria-label="Menu principale">
    <div class="sidebar-brand">
      <strong data-cruscotto-bind="text" data-cruscotto-template="Cruscotto {projectDisplayName}">Cruscotto</strong>
      <span class="muted" data-cruscotto-bind="text" data-cruscotto-template="{projectDisplayName} local">local</span>
      <a class="sidebar-home-link muted" href="/" title="PortalAdmin Home">← Home</a>
    </div>
    <nav class="sidebar-nav">
      <button type="button" data-tab="requisiti" class="active">
        <span class="nav-label">Requisiti</span>
      </button>
      <button type="button" data-tab="servizi">
        <span class="nav-label">Servizi</span>
      </button>
      <button type="button" data-tab="process">
        <span class="nav-label">Process</span>
        <span class="nav-hint muted">strumenti</span>
      </button>
      <button type="button" data-tab="testtecnici">
        <span class="nav-label">TestTecnici</span>
        <span class="nav-hint muted">run + case</span>
      </button>
      <button type="button" data-tab="testfunzionali">
        <span class="nav-label">TestFunzionali</span>
        <span class="nav-hint muted">multi-utente</span>
      </button>
      <button type="button" data-tab="backlog">
        <span class="nav-label">Backlog</span>
        <span class="nav-hint muted">Jira</span>
      </button>
      <button type="button" data-tab="mybacklog">
        <span class="nav-label">MyBacklog</span>
        <span class="nav-hint muted">cache DB</span>
      </button>
      <button type="button" data-tab="workingplan">
        <span class="nav-label">Working Plan</span>
        <span class="nav-hint muted">grooming</span>
      </button>
      <button type="button" data-tab="issue">
        <span class="nav-label">Issue</span>
        <span class="nav-hint muted">vista Jira</span>
      </button>
      <button type="button" data-tab="projectoverview">
        <span class="nav-label">Project Overview</span>
        <span class="nav-hint muted">sintesi</span>
      </button>
      <button type="button" data-tab="cursor">
        <span class="nav-label">Cursor Agent</span>
        <span class="nav-hint muted">local / cloud</span>
      </button>
    </nav>
    <footer class="sidebar-footer muted">
      <code>:3999</code>
    </footer>
  </aside>

  <div class="cruscotto-shell">
    <header class="cruscotto-topbar">
      <div class="cruscotto-topbar-text">
        <h1 id="page-title">Requisiti</h1>
        <p id="page-subtitle" class="muted">Stack, env e comandi di setup</p>
      </div>
      <div id="topbar-actions" class="cruscotto-topbar-actions hidden" aria-label="Azioni tab"></div>
    </header>
    <main class="cruscotto-main">
      <p id="boot-loading" class="boot-loading">Caricamento cruscotto…</p>
      <section id="section-requisiti"></section>
      <section id="section-servizi" class="hidden"></section>
      <section id="section-test" class="hidden"></section>
      <section id="section-process" class="hidden" aria-label="Process Utility"></section>
      <section id="section-testtecnici" class="hidden"></section>
      <section id="section-testfunzionali" class="hidden"></section>
      <section id="section-backlog" class="hidden" aria-label="Backlog">
        <iframe class="jira-working-frame" src="/backlog.html" title="Backlog — elenco completo issue"></iframe>
      </section>
      <section id="section-mybacklog" class="hidden" aria-label="MyBacklog">
        <iframe class="jira-working-frame" src="/my-backlog.html" title="MyBacklog — backlog da cache cruscotto DB"></iframe>
      </section>
      <section id="section-workingplan" class="hidden" aria-label="Working Plan"></section>
      <section id="section-issue" class="hidden" aria-label="Issue Jira">
        <iframe class="jira-working-frame" src="/issue.html" title="Issue — vista dettaglio Jira per issue key"></iframe>
      </section>
      <section id="section-projectoverview" class="hidden" aria-label="Project Overview">
        <iframe class="jira-working-frame" src="/project-overview.html" title="Project Overview — panoramica progetto"></iframe>
      </section>
      <section id="section-cursor" class="hidden" aria-label="Cursor Agent"></section>
    </main>
  </div>

  <div id="ttecnici-doc-modal" class="ttecnici-modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="ttecnici-doc-modal-title" hidden>
    <div class="ttecnici-modal-panel">
      <div class="ttecnici-modal-header">
        <h2 id="ttecnici-doc-modal-title" class="ttecnici-modal-title"></h2>
        <button type="button" class="ttecnici-modal-close" aria-label="Chiudi documentazione">×</button>
      </div>
      <pre class="ttecnici-doc-modal-body"></pre>
    </div>
  </div>

  <script src="/expand-collapse-ui.js" defer></script>
  <script src="/cruscotto.js" defer></script>
</body>
</html>
