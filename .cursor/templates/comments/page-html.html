    Perché esiste:

    - vista statica servita dal dashboard senza build frontend

  Generalizzazione:
    Si | No — shell riusabile su overlay o HTML monolitica per un solo contesto?

  Input (obbligatorio se Si; se No scrivere «Input: —»):

    - marker GENERATED / dati embedded — se HTML rigenerata da script Node
    - asset path (/jira-issue-display.js) — alias statici condivisi

  Servita da:
    - runner/cruscotto.server.mjs — URL / o /app.html
    - admin.portal/portal.home.server.mjs — URL / (admin.portal)

  Asset collegati:
    - nome.css — foglio stili pagina o shared (cruscotto.css, portal.home.css)
    - nome.js — script client companion (vedi template page-html.mjs)

  Note:
